server {
    listen 80;
    server_name accounting.barleylux.com;

    # Match cheque vault upload limit (10MB). Default nginx limit is 1MB and
    # returns an HTML 413 page, which breaks client-side res.json() parsing.
    client_max_body_size 10m;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # OCR + R2 upload can take longer than the default 60s proxy timeout.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
