name: Deploy to DigitalOcean
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            # 1. Validate Repository Exists
            if [ ! -d "/var/www/accounting/.git" ]; then
              echo "🔴 Error: Repository not found in /var/www/accounting."
              echo "Please SSH into the server and run the setup-droplet.sh script first!"
              exit 1
            fi

            cd /var/www/accounting

            # 2. Add safe directory exception to avoid permission issues
            git config --global --add safe.directory /var/www/accounting

            # 3. Pull latest code
            echo "🔵 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 4. Install dependencies
            echo "🔵 Installing dependencies..."
            npm install

            # 5. Database Migrations (set -e safe — failed deploy must not abort before recovery logic)
            bash scripts/deploy-migrate.sh

            # 6. Build Next.js
            echo "🔵 Building application..."
            npm run build

            # 7. Restart PM2
            echo "🔵 Restarting PM2..."
            pm2 restart ecosystem.config.js --env production
            pm2 save

            # 8. One-time backfill: correct invoice statuses left stale by edits
            #    that changed the amount without recalculating status.
            #    - Guarded by a marker file (outside the repo) so it runs ONCE.
            #    - Wrapped in set +e so a failure here NEVER aborts the deploy.
            BACKFILL_MARKER="/var/www/accounting-backfills/invoice-status.done"
            if [ -f "$BACKFILL_MARKER" ]; then
              echo "ℹ️  Invoice status backfill already completed — skipping."
            else
              echo "🔵 Running one-time invoice status backfill..."
              set +e
              npx tsx scripts/backfill-invoice-status.ts --apply
              BACKFILL_EXIT=$?
              set -e
              if [ "$BACKFILL_EXIT" -eq 0 ]; then
                mkdir -p "$(dirname "$BACKFILL_MARKER")"
                date > "$BACKFILL_MARKER"
                echo "✅ Invoice status backfill completed (marker written)."
              else
                echo "⚠️  Invoice status backfill failed (exit $BACKFILL_EXIT). Deploy continues; will retry on next deploy."
              fi
            fi

            echo "✅ Deployment Successful!"